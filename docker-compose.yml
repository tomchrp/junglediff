# ==============================================================================
# FICHIER : docker-compose.yml
# PROJET  : JungleDiff
#
# DESCRIPTION :
# Définition de l'infrastructure locale.
# Ajout du service MinIO (Data Lake) pour le Cold Storage des JSON bruts.
# ==============================================================================

services:
  db:
    image: postgres:15-alpine
    env_file:
      - ./backend/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000" # Port API S3
      - "9001:9001" # Port Console Web
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-junglediff_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-SuperSecretKey123!}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  postgres_data:
  minio_data: